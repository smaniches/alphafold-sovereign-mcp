name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # release-please creates release commits/tags
      pull-requests: write      # release-please opens/updates the release PR
      # Needed so this workflow can dispatch release.yml after release-please
      # creates the GitHub Release. workflow_dispatch is the documented exception
      # that lets a GITHUB_TOKEN-driven workflow start a downstream workflow —
      # without it the release: published / tag-push events authored by
      # GITHUB_TOKEN are suppressed and PyPI never sees the new version.
      #   docs: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
      actions: write
    env:
      # Full-auto releases need a token whose pushes/PRs are NOT suppressed by
      # GitHub's GITHUB_TOKEN cascade rule. With RELEASE_PLEASE_TOKEN set
      # (a fine-grained PAT or GitHub App token with contents + pull-requests
      # write), the release PR is opened under that identity, its CI runs, and
      # the auto-merge step below squash-merges it — so a feat/fix reaches PyPI
      # with zero clicks. With no secret, the token falls back to GITHUB_TOKEN
      # and auto-merge is skipped: behaviour is identical to the previous
      # one-click flow (your own merge of the release PR triggers the follow-up
      # run that cuts the release).
      HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please stamps the new version onto every surface EXCEPT uv.lock's
      # own editable self-package entry: uv.lock is machine-generated, not a
      # release-please extra-file, so its version lags pyproject on the release PR
      # and trips the Version Coherence guard (scripts/version_coherence.py). Rather
      # than hand-sync it every release (as #149 did), regenerate uv.lock on the
      # release branch and push if it changed. On a version-only bump `uv lock`
      # rewrites exactly that one line, so the diff stays minimal. Checked out with
      # RELEASE_PLEASE_TOKEN when present so the push re-triggers the release PR's
      # CI (letting the auto-merge step land it); GITHUB_TOKEN otherwise still
      # leaves the merged release with a coherent lockfile.
      - name: Check out the release PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Guard fromJSON: GitHub evaluates a step's `with:`/`env:` expressions
          # even when the `if:` is false, so a bare fromJSON(steps.release.outputs.pr)
          # throws "Error reading JToken" on every no-op push where pr == ''. The
          # `pr && fromJSON(...) || ''` idiom short-circuits: `&&` skips fromJSON
          # when pr is the empty string, so the template stays valid.
          ref: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).headBranchName || '' }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up uv
        if: ${{ steps.release.outputs.pr }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Sync uv.lock self-version on the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          # Same guard as the checkout step above: short-circuit fromJSON so this
          # env expression stays valid on no-op pushes where pr == ''.
          RELEASE_BRANCH: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).headBranchName || '' }}
        run: |
          set -euo pipefail
          uv lock
          if git diff --quiet -- uv.lock; then
            echo "uv.lock already coherent with pyproject; nothing to push."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -s -m "chore: sync uv.lock self-version for the release"
            git push origin "HEAD:$RELEASE_BRANCH"
          fi

      # Arm native auto-merge on the freshly created/updated release PR so the
      # release lands without a manual click. Gated on RELEASE_PLEASE_TOKEN:
      # a GITHUB_TOKEN-authored merge would not re-trigger this workflow, so the
      # release would never be cut — auto-merge only makes sense with a PAT/App
      # token. Requires "Allow auto-merge" + the required "All Checks Pass"
      # branch-protection check (already configured for Dependabot auto-merge).
      - name: Auto-merge the release PR
        if: ${{ steps.release.outputs.pr && env.HAS_RELEASE_TOKEN == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh pr merge --auto --squash --repo "$GITHUB_REPOSITORY" \
            "${{ fromJSON(steps.release.outputs.pr).number }}"

      # When release-please created a release, fan out to the existing
      # tag-format release pipeline (build + SLSA L3 provenance + CycloneDX/
      # SPDX SBOM + cosign signing + PyPI Trusted Publishing). We use
      # workflow_dispatch rather than the native tag-push / release:published
      # trigger because release-please runs under GITHUB_TOKEN and GitHub
      # deliberately suppresses cascade triggers from GITHUB_TOKEN-authored
      # events. release.yml's `tag` input drives its checkout ref, so the
      # published artefacts reflect the released code rather than main HEAD,
      # and its release-upload step is idempotent (gh release view / --clobber)
      # so attaching assets to the release-please-created release is safe.
      - name: Dispatch build + sign + PyPI publish (release.yml)
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "${{ steps.release.outputs.tag_name }}" \
            --field tag="${{ steps.release.outputs.tag_name }}"
