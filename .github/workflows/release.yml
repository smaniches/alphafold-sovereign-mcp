name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.1.0-rc1)"
        required: true
        type: string

permissions: {}

jobs:
  # ── Build wheel + sdist with a reproducible builder ──────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Build sdist + wheel
        run: uv build
      - name: Show artefacts
        run: ls -la dist/
      - name: Generate SHA-256 hashes
        id: hash
        run: |
          cd dist
          # base64 of "<sha256>  <filename>" lines, per slsa-framework convention
          echo "hashes=$(sha256sum *.tar.gz *.whl | base64 -w0)" >> "$GITHUB_OUTPUT"
      - name: Upload artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── SLSA L3 build provenance (in-toto attestation) ───────────────────────
  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    # IMPORTANT: the SLSA generator reusable workflow MUST be referenced by a
    # semantic-version TAG. It self-verifies its own ref as refs/tags/vX.Y.Z
    # and fails ("Invalid ref ... Expected ref of the form refs/tags/vX.Y.Z")
    # if pinned by commit SHA. Do NOT let an OpenSSF Scorecard "pin actions by
    # hash" pass rewrite this to a SHA — that silently breaks every release.
    # Tag v2.1.0 == commit f7dd8c54c2067bafc12ca7a55595d5ee9b75204a.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      provenance-name: "alphafold-sovereign-mcp.intoto.jsonl"
      upload-assets: false   # we attach to the release in the next job

  # ── SBOM (CycloneDX + SPDX) ──────────────────────────────────────────────
  # Uses a uv-managed venv rather than ``--system`` because Ubuntu 24.04
  # runners mark their system Python as PEP-668 EXTERNALLY-MANAGED, which
  # blocks ``uv pip install --system``.
  sbom:
    needs: [build]
    name: Generate SBOM (CycloneDX + SPDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Create dedicated SBOM venv and install tooling + package
        run: |
          set -euo pipefail
          uv venv .sbom-env --python 3.12
          uv pip install --python .sbom-env/bin/python cyclonedx-bom
          # Install the just-built wheel into the same venv so the
          # CycloneDX "environment" command sees its real dep tree.
          uv pip install --python .sbom-env/bin/python dist/*.whl
      - name: Generate CycloneDX JSON
        run: |
          .sbom-env/bin/cyclonedx-py environment -o sbom.cyclonedx.json
      - name: Generate SPDX JSON
        # syft is a small static binary; install via the official action.
        # It does not need the dedicated venv.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist/
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sboms
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
          retention-days: 7

  # ── Publish to PyPI via Trusted Publishing (OIDC) ────────────────────────
  # No API token required.  PyPI is configured at
  # https://pypi.org/manage/account/publishing/ to accept publishes from
  # this repo's ``release.yml`` running in the ``pypi`` environment.  The
  # ``id-token: write`` permission lets the action mint a short-lived OIDC
  # token that PyPI exchanges for upload authorisation.
  publish-pypi:
    needs: [build, provenance, sbom]
    name: Publish to PyPI (Trusted Publisher)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/alphafold-sovereign-mcp/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish wheel + sdist to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          skip-existing: true     # safe re-runs of the same tag

  # ── Sign artefacts (Sigstore cosign, keyless via OIDC) + publish release ─
  # Idempotent: works whether the GitHub Release already exists (e.g.
  # because the user published it via the web UI before pushing the tag)
  # or not (the workflow creates it from the tag push).
  publish-github:
    needs: [build, provenance, sbom, publish-pypi]
    name: Sign and publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sboms
          path: sboms/
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign each artefact with cosign (keyless OIDC)
        run: |
          set -euo pipefail
          for f in dist/*.tar.gz dist/*.whl; do
            # cosign v3 (installed by cosign-installer v4) writes a single
            # self-contained Sigstore bundle that already includes the
            # signature, certificate, and Rekor entry. The legacy
            # --output-signature / --output-certificate flags are IGNORED under
            # the new bundle format (they produce no files), which previously
            # broke the release upload — so we attach the .sigstore bundle only.
            cosign sign-blob --yes "$f" --bundle "${f}.sigstore"
          done
      - name: Determine tag
        id: tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or upload to GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG=${{ steps.tag.outputs.tag }}
          ASSETS=( dist/*.tar.gz dist/*.whl dist/*.sigstore sboms/sbom.cyclonedx.json sboms/sbom.spdx.json )

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets with --clobber."
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            echo "Creating release $TAG."
            PRERELEASE=""
            if [[ "$TAG" == *-* ]]; then PRERELEASE="--prerelease"; fi
            gh release create "$TAG" \
              --title "AlphaFold Sovereign MCP $TAG" \
              --notes-file CHANGELOG.md \
              $PRERELEASE \
              "${ASSETS[@]}"
          fi
