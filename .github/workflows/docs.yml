name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - "ARCHITECTURE.md"
      - "CHANGELOG.md"
      - "CITATION.cff"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "LIMITATIONS.md"
      - "PRIVACY.md"
      - "SECURITY.md"
      - "STATUS.md"
      - "SUPPORT.md"
      - "AUDIT.md"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-and-deploy:
    name: Build & deploy mkdocs to gh-pages
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for mkdocs gh-deploy to push to gh-pages
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0   # mkdocs needs the full history for revision dates

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Cairo/Pango system libraries (for social-card rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install package + docs deps
        run: uv sync --extra docs

      - name: Build (non-strict; warnings are OK while content stabilises)
        run: uv run mkdocs build --clean

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          uv run mkdocs gh-deploy --force --no-history
