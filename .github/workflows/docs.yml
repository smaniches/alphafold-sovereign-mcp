name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - "ARCHITECTURE.md"
      - "CHANGELOG.md"
      - "CITATION.cff"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "GOVERNANCE.md"
      - "LIMITATIONS.md"
      - "PRIVACY.md"
      - "SECURITY.md"
      - "STATUS.md"
      - "SUPPORT.md"
      - "AUDIT.md"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-and-deploy:
    name: Build & deploy mkdocs to gh-pages
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for mkdocs gh-deploy to push to gh-pages
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # mkdocs needs the full history for revision dates

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Cairo/Pango system libraries (for social-card rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install package + docs deps
        run: uv sync --extra docs

      - name: Build (non-strict; warnings are OK while content stabilises)
        run: uv run mkdocs build --clean

      - name: Deploy to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          uv run mkdocs gh-deploy --force --no-history
