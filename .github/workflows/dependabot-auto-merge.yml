# SPDX-License-Identifier: Apache-2.0
#
# Auto-merge low-risk Dependabot pull requests.
#
# Policy (deliberately conservative for a single-maintainer project):
#   - dev-tooling / CI-action   minor + patch  -> auto-merge
#   - runtime (production)       patch          -> auto-merge
#   - transitive (indirect)      patch          -> auto-merge  (lockfile-only)
#   - runtime (production)       minor          -> HELD for manual review
#   - transitive (indirect)      minor          -> HELD for manual review
#   - anything                   major          -> HELD for manual review
#
# Rationale for the transitive rule: transitive deps are never written to
# pyproject.toml, so their bumps are lockfile-only and outside this package's
# public surface; a patch (bug-fix) bump that clears the full CI gate is
# low-risk. This is the case that previously fell through every rule (e.g. the
# joserfc bump).
#
# Note on security updates: there is deliberately NO ghsa-id rule. A security
# *patch* on a direct or transitive dep already auto-merges via the patch rules
# above; security minors/majors are held for manual review (the safe default).
# A `ghsa-id`-based rule would be dead code here anyway — fetch-metadata only
# populates `ghsa-id` when run with `alert-lookup: true` plus a token that can
# read Dependabot alerts, which GITHUB_TOKEN cannot.
#
# "Auto-merge" only ARMS GitHub's native auto-merge; the PR is not merged
# until the required "All Checks Pass" status check on `main` is green. If a
# check fails, the PR simply sits there. See README / dependabot.yml.
#
# Prerequisites (one-time, set in the GitHub UI — a workflow cannot set them):
#   1. Settings -> General -> Pull Requests -> "Allow auto-merge" = ON.
#   2. A branch protection rule / ruleset on `main` that requires the
#      "All Checks Pass" status check (and ideally "Require branches to be
#      up to date before merging"). Without a required check, GitHub cannot
#      arm auto-merge and the final step below will fail.
#
# Trigger note: this uses `pull_request` (not `pull_request_target`) because
# Dependabot opens PRs from same-repo branches, so the safer trigger is
# sufficient. The explicit `permissions` block grants the otherwise
# read-only Dependabot token the write scopes needed to arm auto-merge.

name: Dependabot auto-merge

on: pull_request

permissions:
  contents: read

jobs:
  dependabot:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # native auto-merge arms a merge of the PR branch
      pull-requests: write      # `gh pr merge --auto` updates the PR
    # Only run for Dependabot's own PRs on this repository (never forks).
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'smaniches/alphafold-sovereign-mcp'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Arm auto-merge for the low-risk subset
        if: >-
          (
            steps.meta.outputs.update-type == 'version-update:semver-patch' &&
            steps.meta.outputs.dependency-type == 'direct:production'
          ) ||
          (
            (
              steps.meta.outputs.update-type == 'version-update:semver-patch' ||
              steps.meta.outputs.update-type == 'version-update:semver-minor'
            ) &&
            (
              steps.meta.outputs.dependency-type == 'direct:development' ||
              steps.meta.outputs.package-ecosystem == 'github-actions' ||
              steps.meta.outputs.package-ecosystem == 'github_actions'
            )
          ) ||
          (
            steps.meta.outputs.update-type == 'version-update:semver-patch' &&
            steps.meta.outputs.dependency-type == 'indirect'
          )
        run: gh pr merge --auto --squash "${PR_URL}"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
