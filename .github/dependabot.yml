# SPDX-License-Identifier: Apache-2.0
#
# Dependabot configuration.
#
# Two ecosystems are watched:
#   - The `uv` ecosystem updates both pyproject.toml and uv.lock natively,
#     keeping the manifest and the lockfile in sync in a single PR. Covers
#     the runtime dependencies plus the dev / docs / security / tda extras.
#   - GitHub Actions used by .github/workflows/*. Action SHAs are pinned via
#     major-version tags; Dependabot raises a PR when a new tag is published,
#     the maintainer reviews and merges.
#
# Schedule: weekly on Mondays at 09:00 UTC. Single PR per ecosystem caps
# review burden for the solo maintainer.

version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
